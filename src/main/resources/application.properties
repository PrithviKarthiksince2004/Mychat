# --- MySQL connection ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:whatsapp_clone}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Web Server ---
server.port=${PORT:8080}

# --- JWT Config ---
jwt.secret=${JWT_SECRET:default_secret_key_that_is_at_least_32_bytes_long_for_security}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- File Storage ---
upload.dir=${UPLOAD_DIR:uploads}
