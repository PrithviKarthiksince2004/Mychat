services:
  - type: web
    name: mychat
    runtime: docker
    repo: https://github.com/PrithviKarthiksince2004/Mychat
    branch: main
    plan: free
    healthCheckPath: /
    envVars:
      # Use your Railway (or other) MySQL credentials — Render has no free managed MySQL
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        sync: false
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
